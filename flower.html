<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FLOWER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

/* 萤火虫光点 */
.light{
  position:absolute;
  width:4px;height:4px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 10px #fff,0 0 20px #a5f3fc;
  animation:float 8s infinite ease-in-out;
}
@keyframes float{
  0%{transform:translate(0,0) scale(1);opacity:0}
  20%{opacity:1}
  80%{opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

/* 飘落花瓣 */
.fall-petal{
  position:absolute;
  width:15px;height:25px;
  background:linear-gradient(#fda4af,#f472b6);
  border-radius:50%;
  opacity:0.7;
  animation:fall 10s linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-10%) rotate(0deg);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}

/* 花朵整体摇摆+呼吸发光 */
.flower{
  position:relative;
  animation:sway 5s ease-in-out infinite alternate, glow 3s ease-in-out infinite alternate;
}
@keyframes sway{
  0%{transform:rotate(-4deg)}
  100%{transform:rotate(4deg)}
}
@keyframes glow{
  0%{filter:drop-shadow(0 0 10px #f472b6)}
  100%{filter:drop-shadow(0 0 25px #fb7185)}
}

/* 花心 超强发光 */
.center{
  width:60px;height:60px;
  background:radial-gradient(#fffbeb,#fbbf24,#f59e0b);
  border-radius:50%;
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 30px #fbbf24,0 0 60px #f59e0b;
  z-index:2;
}

/* 花瓣 渐变+柔边 */
.petal{
  width:90px;height:140px;
  background:linear-gradient(45deg,#fda4af,#ec4899,#be185d);
  border-radius:50%;
  position:absolute;
  top:-70px;left:-45px;
  transform-origin:center bottom;
  box-shadow:0 0 12px rgba(236,72,153,0.4);
}
.petal:nth-child(1){transform:rotate(0deg)}
.petal:nth-child(2){transform:rotate(45deg)}
.petal:nth-child(3){transform:rotate(90deg)}
.petal:nth-child(4){transform:rotate(135deg)}
.petal:nth-child(5){transform:rotate(180deg)}
.petal:nth-child(6){transform:rotate(225deg)}
.petal:nth-child(7){transform:rotate(270deg)}
.petal:nth-child(8){transform:rotate(315deg)}

/* 花茎 */
.stem{
  width:14px;height:240px;
  background:linear-gradient(#4ade80,#16a34a,#15803d);
  position:absolute;
  bottom:-240px;left:50%;
  transform:translateX(-50%);
  border-radius:8px;
  box-shadow:0 0 8px #22c55e;
}

/* 叶子 */
.leaf{
  width:70px;height:35px;
  background:linear-gradient(#86efac,#22c55e);
  border-radius:50%;
  position:absolute;
  bottom:-130px;
  box-shadow:0 0 8px #4ade80;
}
.leaf1{left:-30px;transform:rotate(-35deg)}
.leaf2{right:-30px;transform:rotate(35deg)}
</style>
</head>
<body>
<div class="flower">
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="petal"></div>
  <div class="center"></div>
  <div class="stem"></div>
  <div class="leaf leaf1"></div>
  <div class="leaf leaf2"></div>
</div>

<script>
// 生成萤火虫
for(let i=0;i<30;i++){
  const d=document.createElement('div');
  d.className='light';
  d.style.left=Math.random()*100+'%';
  d.style.top=Math.random()*100+'%';
  d.style.setProperty('--tx',(Math.random()-0.5)*200+'px');
  d.style.setProperty('--ty',(Math.random()-0.5)*200+'px');
  d.style.animationDelay=Math.random()*8+'s';
  document.body.appendChild(d);
}

// 生成飘落花瓣
setInterval(()=>{
  const p=document.createElement('div');
  p.className='fall-petal';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(Math.random()*5+8)+'s';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),15000);
},400);
</script>
</body>
</html>
